services:
  frontend:
    image: ${FRONTEND_IMAGE:-gugaarleo/finances-frontend:latest}
    container_name: finances-frontend
    environment:
      FRONTEND_API_URL: ${FRONTEND_API_URL:-http://localhost:8080}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - backend

  backend:
    image: ${BACKEND_IMAGE:-gugaarleo/finances-backend:latest}
    container_name: finances-backend
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-finances}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_CREATE_DROP: ${POSTGRES_CREATE_DROP:-update}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY before starting the stack}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-3600000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://super-duper-invention-jqx5w7x44772g4-4200.app.github.dev/}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16.3
    container_name: finances-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-finances}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: